<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Proa 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="smo.ico" type="image/x-icon">
</head>
<body>
  <main class="game">
    <h1 id="level-title">Press A Key to Start</h1>

    <div class="container">
      <div class="row">
        <button class="btn green" id="green" aria-label="green"></button>
        <button class="btn red" id="red" aria-label="red"></button>
      </div>
      <div class="row">
        <button class="btn yellow" id="yellow" aria-label="yellow"></button>
        <button class="btn blue" id="blue" aria-label="blue"></button>
      </div>
    </div>
    <h5>Estudiantes de sexto año PROA hicieron esta aplicación</h5>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
